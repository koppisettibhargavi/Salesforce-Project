<template>
    <lightning-card>
        <h1>detailform</h1>
    <lightning-record-view-form object-api-name={objectApiName} record-id={recordId}>
       <template for:each={fields} for:item="field">
            <lightning-output-field
                key={field}
                field-name={field}>
            </lightning-output-field>
        </template>

        <lightning-button
            type="submit"
            label="Save"
            >
        </lightning-button>
    </lightning-record-view-form>
      
    </lightning-card>
</template>
