<template>
    <lightning-modal-header label={heading}></lightning-modal-header>
    <lightning-modal-body>
        <p>When you open another modal, the modal is displayed with a higher z-index. So you can be sure that the modal overlays previously opened modals.</p>
    </lightning-modal-body>
    <lightning-modal-footer>
        <template for:each={options} for:item="option">
            <lightning-button
                key={option.id}
                label={option.label}
                class="slds-button"
                data-focus={option.focusName}
                variant={option.variant}
                onclick={handleOptionClick}
                data-id={option.id}
                data-label={option.label}
            ></lightning-button>
        </template>
    </lightning-modal-footer>
</template>
