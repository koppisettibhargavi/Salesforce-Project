     <lightning-card>

        object-api-name={objectApiName} record-id={recordId}>

        <template for:each={fields} for:item="field">

            label="Save"
            onclick={handleSuccessevent}>
        </lightning-button>
       
    </lightning-record-edit-form>

      <c-data-table-with-search record-id={recordId} object-api-name={objectApiName}></c-data-table-with-search>
    </lightning-card>
