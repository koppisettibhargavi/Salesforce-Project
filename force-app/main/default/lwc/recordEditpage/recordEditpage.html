<template>
     <lightning-card title="Account Details">
         <h1>i am edit page</h1>
        <lightning-record-edit-form
            record-id={recordId}
            object-api-name={objectApiName}
            onsuccess={handleSuccess}
            onerror={handleError}
            
            >
            <lightning-messages></lightning-messages>
            <lightning-input-field field-name="Name"></lightning-input-field>
            <lightning-input-field field-name="Industry"></lightning-input-field>
            <lightning-input-field field-name="Phone"></lightning-input-field>
            <lightning-input-field field-name="Rating"></lightning-input-field>
            <lightning-button label="edit" type="submit"></lightning-button>
            <lightning-button label="reset" type="reset" onclick={clickHandler}></lightning-button>
        </lightning-record-edit-form>
    </lightning-card>
</template>
